services:
  tg-proxy:
    image: ghcr.io/telemt/telemt:latest
    container_name: tg-proxy
    restart: always
    ports:
      - 4343:4343             # Proxy
      - 127.0.0.1:19090:9090  # Metrics
      - 127.0.0.1:19091:9091  # API
    working_dir: /run/telemt
    volumes:
      - ./config.toml:/run/telemt/config.toml:ro
    tmpfs:
      - /run/telemt:rw,mode=1777,size=1m
    environment:
      - RUST_LOG=debug
    cap_drop:
      - ALL
    # allow binding to port 443
    # cap_add:
    #   - NET_BIND_SERVICE
    read_only: true
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

# docker compose up -d
# ip=$(ip a show eth0 | awk '/inet / {print $2}' | cut -d/ -f1)
# docker compose logs | grep -m 1 tg://proxy | awk -F' ' '{print $NF}' | sed -E "s/server=[0-9.]+/server=$ip/"