[SERVICE]
    Flush               1
    Log_Level           info
    Parsers_File        parsers.conf

[INPUT]
    Name                tail
    Path                /var/lib/docker/containers/*/*.log
    Parser              docker
    Tag                 docker.<id>
    Tag_Regex           /var/lib/docker/containers/(?<id>[^/]+)/.*log

[FILTER]
    Name                modify
    Match               docker.*
    Copy                @tag container_id

[FILTER]
    Name                record_modifier
    Match               docker.*
    Allowlist_key       log, container_id, stream

# [OUTPUT]
#     Name                stdout
#     Match               *

[OUTPUT]
    Name                loki
    Match               docker.*
    Host                loki-server
    Port                3100
    Labels              job=fluentbit
    Label_Keys          $container_id, $stream
    Line_Format         json