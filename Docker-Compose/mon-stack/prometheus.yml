################################################### Docker ###################################################

  - job_name: logporter
    scrape_interval: 5s
    scrape_timeout: 1s
    static_configs:
      - targets:
        - logporter:9333
        # - 192.168.3.105:9333
        # - 192.168.3.106:9333

  # - job_name: cadvisor
  #   static_configs:
  #     - targets:
  #       - cadvisor:8080
  #       # - 192.168.3.105:8080
  #       # - 192.168.3.106:8080

################################################### Blackbox ###################################################

  - job_name: blackbox-icmp
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: /probe
    params:
      module: [icmp_ping]
    static_configs:
      - targets:
        - 8.8.8.8
        # - 192.168.3.105
        # - 192.168.3.106
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # - job_name: blackbox-tcp
  #   scrape_interval: 30s
  #   scrape_timeout: 5s
  #   metrics_path: /probe
  #   params:
  #     module: [tcp_ssh]
  #   static_configs:
  #     - targets:
  #       - 192.168.3.105:2121
  #       - 192.168.3.106:2121
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: __param_target
  #     - source_labels: [__param_target]
  #       target_label: instance
  #     - target_label: __address__
  #       replacement: blackbox-exporter:9115

  - job_name: blackbox-http
    scrape_interval: 1m
    scrape_timeout: 5s
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - https://google.com
        - https://github.com
        - https://gitlab.com
        - https://docker.com
        - https://vercel.com
        # - http://192.168.3.105:9100
        # - http://192.168.3.106:9100
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

