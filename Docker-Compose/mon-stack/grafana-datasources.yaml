apiVersion: 1

datasources:
  - name: prometheus
    type: prometheus    
    url: http://prometheus:9090
    isDefault: true
    access: proxy
    editable: true
  - name: loki
    type: loki
    url: http://loki-server:3100
    access: proxy
    editable: true
