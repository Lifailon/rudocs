############################################################ SSH/SFTP ############################################################

services:
  # Платформа для управлени SSH-подключениями с доступом к файлам и мониторингом ресурсов
  termix:
    image: ghcr.io/lukegus/termix:latest
    container_name: termix
    restart: unless-stopped
    environment:
      PORT: 8080
    ports:
      - 6988:8080
    volumes:
      - ./termix_data:/app/data

