############################################################ DevOps Tools ############################################################

  # Большая коллекция утилит для разработчиков (криптография, конверторы, веб инструменты и многое другое).
  # Playground: https://it-tools.tech
  it-tools:
    image: corentinth/it-tools:latest
    container_name: it-tools
    restart: unless-stopped
    ports:
      - 6990:80

  # Формирует скрипты для автоматической установки приложений для разных дистрибутивов Linux
  tuxmate:
    image: ghcr.io/abusoww/tuxmate:latest
    container_name: tuxmate
    restart: unless-stopped
    ports:
      - 3080:80
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Универсальный инструмент для шифрования, кодирования, сжатия и анализа данных
  # Playground: https://gchq.github.io/CyberChef
  cyberchef:
    image: mpepping/cyberchef:latest
    container_name: cyberchef
    restart: unless-stopped
    ports:
      - 6990:8000

  # Универсальный веб-конвертор
  # Playground: https://transform.tools
  transform:
    image: lifailon/transform:amd64
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: transform
    restart: unless-stopped
    ports:
      - 3090:3000

  # Веб-приложение для визуализации JSON, YAML, XML и CSV в интерактивные графики
  # Playground: https://jsoncrack.com/editor
  jsoncrack:
    image: shokohsc/jsoncrack:latest
    container_name: jsoncrack
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    # Доступ через Proxy по FQDN
    # ports:
    #   - 3080:8080
    labels:
      - traefik.enable=true

  # Инструмент для сжатия, изменения разрешения и конвертации изображений
  # Playground: https://mazanoke.com
  mazanoke:
    image: ghcr.io/civilblur/mazanoke:latest
    container_name: mazanoke
    restart: unless-stopped
    ports:
      - 3474:80

