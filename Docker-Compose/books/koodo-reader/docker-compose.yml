services:
  koodo-reader:
    image: liwangsheng/koodo-reader:latest
    container_name: koodo-reader
    restart: unless-stopped
    ports:
      - 80:80
      - 8080:8080
    environment:
      - SERVER_USERNAME=admin
      - SERVER_PASSWORD=admin
      - ENABLE_HTTP_SERVER=false
    volumes:
      - ./koodo_data:/app/uploads