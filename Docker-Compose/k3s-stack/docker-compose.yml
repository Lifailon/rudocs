services:
  k3s-server:
    image: rancher/k3s:latest
    container_name: k3s-server
    restart: always
    command: server
    privileged: true
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    environment:
    - K3S_TOKEN=${K3S_TOKEN:?err}
    - K3S_KUBECONFIG_OUTPUT=/cfg/kubeconfig.yaml
    - K3S_KUBECONFIG_MODE=666
    ports:
    - 6443:6443  # Kubernetes API Server
    - 80:80      # Ingress controller port 80
    - 443:443    # Ingress controller port 443
    volumes:
    - ./k3s_server_data:/var/lib/rancher/k3s
    # Get kubeconfig
    - .:/cfg
    tmpfs:
    - /run
    - /var/run

  agent:
    image: rancher/k3s:latest
    container_name: k3s-agent
    restart: always
    privileged: true
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    environment:
    - K3S_URL=https://k3s-server:6443
    - K3S_TOKEN=${K3S_TOKEN:?err}
    volumes:
    - ./k3s_agent_data:/var/lib/rancher/k3s
    tmpfs:
    - /run
    - /var/run

  # K3S_TOKEN=${RANDOM}${RANDOM}${RANDOM} docker-compose up -d

  rancher:
    image: rancher/rancher:latest
    container_name: rancher
    restart: unless-stopped
    privileged: true
    volumes:
    - ./rancher_data:/var/lib/rancher
    ports:
    - 3080:80
    - 3443:443

  # docker logs rancher 2>&1 | grep "Bootstrap Password:" | sed -E "s/.+\: //"