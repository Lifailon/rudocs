services:
  control-plane:
    image: rancher/k3s:latest
    container_name: control-plane
    restart: always
    command: server
    privileged: true
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    environment:
    - K3S_TOKEN=${K3S_TOKEN:?err}
    - K3S_KUBECONFIG_OUTPUT=/cfg/kubeconfig.yaml
    - K3S_KUBECONFIG_MODE=666
    ports:
    # Kubernetes API Server
    - 6443:6443
    # Ingress controller
    - 6480:80
    - 6444:443
    volumes:
    - ./k3s_server_data:/var/lib/rancher/k3s
    # Get kubeconfig
    - .:/cfg
    tmpfs:
    - /run
    - /var/run

  k3s-worker:
    image: rancher/k3s:latest
    container_name: k3s-worker
    restart: always
    privileged: true
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    environment:
    - K3S_URL=https://control-plane:6443
    - K3S_TOKEN=${K3S_TOKEN:?err}
    volumes:
    - ./k3s_agent_data:/var/lib/rancher/k3s
    tmpfs:
    - /run
    - /var/run

  # echo K3S_TOKEN=${RANDOM}${RANDOM}${RANDOM} > .env
  # docker-compose up -d
  # export KUBECONFIG=/home/lifailon/docker/k3s/kubeconfig.yaml
  # kubectl get nodes
  # kubectl create serviceaccount devops -n kube-system
  # kubectl create clusterrolebinding devops-role --clusterrole=cluster-admin --serviceaccount=kube-system:devops
  # kubectl create token devops -n kube-system --duration=999999h

  rancher:
    image: rancher/rancher:latest
    container_name: rancher
    restart: unless-stopped
    privileged: true
    volumes:
    - ./rancher_data:/var/lib/rancher
    ports:
    - 3080:80
    - 3443:443

  # docker logs rancher 2>&1 | grep "Bootstrap Password:" | sed -E "s/.+\: //"