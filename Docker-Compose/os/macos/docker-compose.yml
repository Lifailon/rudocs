services:
  macos:
    image: dockurr/macos
    container_name: macos
    restart: always
    stop_grace_period: 2m
    devices:
      - /dev/kvm
      - /dev/net/tun
      - /dev/vhost-net
    device_cgroup_rules:
      - 'c *:* rwm'
    cap_add:
      - NET_ADMIN
    ports:
      - 8067:8006
      - 5900:5900/tcp
      - 5900:5900/udp
    environment:
      - VERSION=15
      - CPU_CORES=1
      - RAM_SIZE=4G
      - DISK_SIZE=64G
      - DHCP=Y
    volumes:
      - ./macos_data:/storage