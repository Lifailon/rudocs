################################################### Compose ###################################################

  # Web interface for Docker Compose
  # https://github.com/louislam/dockge
  dockge:
    image: louislam/dockge:1
    container_name: dockge
    restart: always
    volumes:
      - ./dockge_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      # Docker stacks directory on host:container
      - $HOME/docker:/home/lifailon/docker
    # Enable routing for traffic
    # labels:
    #   - traefik.enable=true
    environment:
      # Enable routing for docker-gen
      # - VIRTUAL_HOST=dockge.local
      - DOCKGE_STACKS_DIR=/docker
      # Доступ к консоли dockge
      - DOCKGE_ENABLE_CONSOLE=true
    ports:
      - 5001:5001

  # Manage Docker Compose services from the terminal (TUI) or browser
  # https://github.com/Lifailon/lazycompose
  # WebUI:  http://192.168.3.101:3333
  # TUI:    docker attach lazycompose
  lazycompose:
    image: lifailon/lazycompose:latest
    container_name: lazycompose
    restart: always
    stdin_open: true
    tty: true
    environment:
      - COMPOSE_PATH=/docker
      - COMPOSE_FIND_DEPTH=3
      - TTYD_MODE=true
      - TTYD_PORT=3333
      - TTYD_USER=
      - TTYD_PASS=
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Path to your Docker Compose projects (host:container)
      - /home/lifailon/docker:/docker
      # Configuration using your custom commands (optional)
      # - ./config.yml:/config.yml
    ports:
      - 3333:3333

