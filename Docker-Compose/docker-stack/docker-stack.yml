services:
  dockge:
    image: louislam/dockge:1
    container_name: dockge
    restart: always
    volumes:
      - ./dockge_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - $HOME/docker:/docker
    environment:
      - DOCKGE_STACKS_DIR=/docker
      - DOCKGE_ENABLE_CONSOLE=true
    ports:
      - 5001:5001

  lazycompose:
    image: lifailon/lazycompose:latest
    container_name: lazycompose
    restart: always
    stdin_open: true
    tty: true
    environment:
      - TTYD_MODE=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/lifailon/docker:/docker
    ports:
      - 3333:3333

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dozzle_data:/data
    environment:
      - DOZZLE_NO_ANALYTICS=true
      - DOZZLE_ENABLE_ACTIONS=true
      - DOZZLE_ENABLE_SHELL=true
      - DOZZLE_AUTH_PROVIDER=simple
      - DOZZLE_REMOTE_HOST=tcp://192.168.3.105:2375|rpi-105,tcp://192.168.3.106:2375|rpi-106
    ports:
      - 9999:8080

  host-syslog:
    image: alpine
    container_name: host-syslog
    restart: always
    volumes:
      - /var/log/syslog:/var/log/custom.log
    command:
      - tail
      - -f
      - /var/log/custom.log

  beszel-server:
    image: henrygd/beszel:latest
    container_name: beszel-server
    restart: always
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./beszel_server_data:/beszel_data
    ports:
      - 8090:8090

  beszel-agent:
    image: henrygd/beszel-agent:latest
    container_name: beszel-agent
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./beszel_agent_data:/var/lib/beszel-agent
    environment:
      - KEY=ssh-ed25519
        AAAAC3NzaC1lZDI1NTE5AAAAICY621efzKYU5D1qYOWsiL2d2QGx/O2IcMV2S4xPYyln
      - HUB_URL=http://beszel-server:8090
      - LISTEN=45876

  wud:
    image: getwud/wud
    container_name: wud
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 5002:3000
    environment:
      - WUD_TRIGGER_DOCKER_LOCAL_ENABLED=true
      - WUD_TRIGGER_DOCKER_LOCAL_MODE=pull
      # - WUD_TRIGGER_DOCKER_LOCAL_MODE=recreate
      - WUD_TRIGGER_TELEGRAM_1_CHATID=
      - WUD_TRIGGER_TELEGRAM_1_BOTTOKEN=
      - HTTPS_PROXY=http://192.168.3.105:20171
      - NO_PROXY="localhost,127.0.0.1,192.168.3.0/24"
      - WUD_TRIGGER_GOTIFY_LOCAL_URL=http://gotify:80
      - WUD_TRIGGER_GOTIFY_LOCAL_TOKEN=AA6o7PPsdJIFoo_

  gotify:
    image: gotify/server
    container_name: gotify
    restart: always
    ports:
      - 5080:80
    environment:
      GOTIFY_DEFAULTUSER_PASS: admin
    volumes:
      - ./gotify_data:/app/data