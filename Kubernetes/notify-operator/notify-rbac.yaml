apiVersion: v1
kind: ServiceAccount
metadata:
  name: telegram-operator-sa
  namespace: default

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: telegram-operator-role
rules:
  # Права на CRD TelegramNotify
  - apiGroups: ["api.tg.com"]
    resources: ["notify"]
    verbs: ["get", "list", "watch"]
  # Права на системные события
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: telegram-operator-rb
subjects:
  - kind: ServiceAccount
    name: telegram-operator-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: telegram-operator-role
  apiGroup: rbac.authorization.k8s.io