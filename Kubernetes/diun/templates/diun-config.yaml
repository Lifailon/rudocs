apiVersion: v1
kind: ConfigMap
metadata:
  name: diun-config
  namespace: default
data:
  DIUN_PROVIDERS_KUBERNETES: "true"
  DIUN_PROVIDERS_KUBERNETES_WATCHBYDEFAULT: {{ .Values.app.config.watch }}
  DIUN_WATCH_SCHEDULE: {{ .Values.app.config.scheduler }}
  LOG_LEVEL: {{ .Values.app.config.logLevel }}
  LOG_JSON: {{ .Values.app.config.logJson }}
  TZ: {{ .Values.app.config.timezone }}