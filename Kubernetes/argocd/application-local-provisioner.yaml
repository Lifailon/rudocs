apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-path-provisioner
spec:
  destination:
    namespace: local-path-storage
    server: https://kubernetes.default.svc
  source:
    path: Kubernetes/provisioners/local
    repoURL: https://github.com/Lifailon/rudocs
    targetRevision: main
  sources: []
  project: default
  syncPolicy: {}