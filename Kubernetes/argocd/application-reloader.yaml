apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reloader
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  source:
    path: Kubernetes/reloader
    repoURL: https://github.com/Lifailon/rudocs
    targetRevision: main
  sources: []
  project: default
  syncPolicy: {}