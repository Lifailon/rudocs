apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
spec:
  project: default
  syncPolicy: {}
  source:
    path: Kubernetes/headlamp
    repoURL: https://github.com/Lifailon/rudocs
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system