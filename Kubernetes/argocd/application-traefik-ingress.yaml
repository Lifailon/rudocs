apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
spec:
  project: default
  syncPolicy: {}
  source:
    path: Kubernetes/traefik-ingress
    repoURL: https://github.com/Lifailon/rudocs
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: default