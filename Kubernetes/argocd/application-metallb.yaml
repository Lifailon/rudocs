apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
spec:
  project: default
  syncPolicy: {}
  source:
    path: Kubernetes/metallb
    repoURL: https://github.com/Lifailon/rudocs
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system