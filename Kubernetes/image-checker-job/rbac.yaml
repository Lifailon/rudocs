apiVersion: v1
kind: ServiceAccount
metadata:
  name: image-checker-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: image-checker-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: image-checker-binding
subjects:
- kind: ServiceAccount
  name: image-checker-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: image-checker-role
  apiGroup: rbac.authorization.k8s.io