apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.app.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.app.name }}
    spec:
      serviceAccountName: {{ .Values.rbac.sa }}
      containers:
        - name: {{ .Values.app.name }}
          image: {{ .Values.app.image }}:{{ .Values.app.version }}
          ports:
            - containerPort: {{ .Values.service.targetPort | default 8080 }}
          env:
            - name: DOZZLE_MODE
              value: "k8s"
            - name: DOZZLE_AUTH_PROVIDER
              value: "simple"
          volumeMounts:
            - name: auth-config
              mountPath: /data/users.yml
              subPath: users.yml
              readOnly: true
      volumes:
        - name: auth-config
          secret:
            secretName: {{ .Values.app.name }}-secrets