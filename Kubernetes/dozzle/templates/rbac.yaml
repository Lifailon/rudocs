{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.rbac.sa }}
  namespace: {{ .Values.app.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.app.name }}-pod-viewer-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.app.name }}-pod-viewer-binding
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.sa }}
    namespace: {{ .Values.app.namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.app.name }}-pod-viewer-role
  apiGroup: rbac.authorization.k8s.io
{{- end }}