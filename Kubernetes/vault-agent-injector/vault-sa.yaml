apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-sa
  namespace: telegram
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-delegator
subjects:
- kind: ServiceAccount
  name: vault-sa
  namespace: telegram
roleRef:
  kind: ClusterRole
  name: system:auth-delegator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: vault-token
  namespace: telegram
  annotations:
    kubernetes.io/service-account.name: vault-sa