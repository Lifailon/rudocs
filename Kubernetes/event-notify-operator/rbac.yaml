apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-notify-operator-sa
  namespace: monitoring

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: event-notify-operator-role
rules:
  # Права на чтение и наблюдение системных событий
  # Выполнение команды kubectl get events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: event-notify-operator-rb
subjects:
  - kind: ServiceAccount
    name: event-notify-operator-sa
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: event-notify-operator-role
  apiGroup: rbac.authorization.k8s.io